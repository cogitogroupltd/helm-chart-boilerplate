apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:

  name: ist-graph-gateway-graph-gateway-ext-gapi

  namespace: default
  labels:
    helm.sh/chart: app-0.5.1
    app.kubernetes.io/name: app
    app.kubernetes.io/instance: gapi
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
  annotations:


    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig":
      { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/backend-protocol: HTTPS
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-2:048181539776:certificate/0d17e0af-8304-4639-bc8c-e594fda27bff
    alb.ingress.kubernetes.io/group.name: ist-gapi-ext-dev-green
    alb.ingress.kubernetes.io/healthcheck-path: /healthz/ready
    alb.ingress.kubernetes.io/healthcheck-port: status-port
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/load-balancer-attributes: routing.http.drop_invalid_header_fields.enabled=true
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-2-Ext-2018-06
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=120
    alb.ingress.kubernetes.io/target-type: instance
    external-dns.alpha.kubernetes.io/hostname: graph-gateway-gapi.green.dev.k8s.tuo.hpw.local
    external-dns.alpha.kubernetes.io/ingress-hostname-source: annotation-only
    kubernetes.io/ingress.class: alb

spec:


  rules:
  - host: www.dev.graph.qld.gov.au
    http:
      paths:
      - backend:
          service:
            name: gateway
            port:
              number: 443
        path: /*
        pathType: ImplementationSpecific
  - host: graph-gateway-gapi.green.dev.k8s.tuo.hpw.local
    http:
      paths:
      - backend:
          service:
            name: gateway
            port:
              number: 443
        path: /*
        pathType: ImplementationSpecific
---
