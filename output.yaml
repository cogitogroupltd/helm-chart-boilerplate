metadata:
  name: graph-gateway-graph-gateway-gapi-istio-mtls
  namespace: sc-gapi
spec:


  host: ing-graph-gateway-graph-gateway.sc-gapi.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
# Source: app/templates/externalsecret.yaml
apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: graph-gateway-ssm
  annotations:


   project: tuo
   type: api-service

spec:


  data:
  - remoteRef:
      key: /myqld/shared/k8s/newrelic/license_key
    secretKey: NEW_RELIC_LICENSE_KEY
  - remoteRef:
      key: /myqld/shared/k8s/runtime_category
    secretKey: TUO_RUNTIME_CATEGORY
  refreshInterval: 5m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: systemmanager
  target:
    name: graph-gateway-ssm