{{- if .Values.ingress.enabled }}
{{- range $key, $value := .Values.ingress.resources }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $key }}
  namespace: {{ if $value.namespace }}{{ $value.namespace }}{{ else }}{{ $.Release.Namespace }}{{ end }}
  labels:
{{ if $value.labels }}
    {{- with $value.labels -}}
    {{- .| toYaml | indent 4 -}}
    {{ end }}
{{ else }}
    {{- include "generic.labels" $ | nindent 4 }}
{{ end }}
  annotations:
    {{ with $value.annotations }} 
    {{ . | toYaml | nindent 4 }}
    {{ end }}
spec:
{{ with $value.spec }} 
{{ . | toYaml | nindent 2 }}
{{ end }}
---
{{ end }}
{{ end }}